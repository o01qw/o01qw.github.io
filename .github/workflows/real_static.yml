/* ── PATTERN DETECTION ── */
function detectPattern(e) {
  const { tenure, engagement, role } = e.factors;
  const trendDelta = e.trend[5] - e.trend[0];
  const recentAccel = e.trend[5] - e.trend[3];
  if (role === 'management' && e.risk < 25) return { key:'stable', label:'Stable Retention Pattern', issue:'Low churn probability — maintain regular check-ins', cls:'stable', color:'#276749', num:'#0F6E56' };
  if (engagement === 'unknown' || (e.los < 0.8 && e.risk > 60)) return { key:'flight', label:'Early Flight Risk Pattern', issue:'Likely issue: insufficient onboarding engagement and no career dialogue established', cls:'flight', color:'#c53030', num:'#e53e3e' };
  if (recentAccel > 18 && engagement === 'low') return { key:'burnout', label:'Burnout / Overload Pattern', issue:'Likely issue: sustained pressure causing disengagement and withdrawal', cls:'burnout', color:'#c05621', num:'#dd6b20' };
  if (engagement === 'low' && e.risk >= 50) return { key:'recognition', label:'Recognition Deficit Pattern', issue:'Likely issue: employee feels invisible despite performance — recognition gap driving exit intent', cls:'recognition', color:'#3730a3', num:'#4f46e5' };
  if (trendDelta > 25 && tenure.includes('high')) return { key:'stagnation', label:'Career Stagnation Pattern', issue:'Likely issue: uncertainty about future at Nexia — no clear development signal', cls:'stagnation', color:'#0F6E56', num:'#0ABEA8' };
  return { key:'stagnation', label:'Career Stagnation Pattern', issue:'Likely issue: unclear progression path reducing commitment to the firm', cls:'stagnation', color:'#0F6E56', num:'#0ABEA8' };
}

/* ── BRIEF RENDERER ── */
function renderBriefHTML(b) {
  const C = ['#0D3349','#0F6E56','#854F0B'];
  return `
    <div class="brief-section">
      <div class="brief-section-header">
        <div class="brief-section-num" style="background:${C[0]}">1</div>
        <div class="brief-section-title">Risk Summary</div>
      </div>
      <div class="brief-section-body">
        <p><strong>Why at risk:</strong> ${b.s1.why}</p>
        <p style="margin-top:6px"><strong>What changed:</strong> ${b.s1.changed}</p>
        <p style="margin-top:6px"><strong>Top contributing factors:</strong></p>
        <ul>${b.s1.factors.map(f=>`<li>${f}</li>`).join('')}</ul>
        <p style="margin-top:6px"><strong>Likely pain points:</strong></p>
        <ul>${b.s1.pain.map(p=>`<li>${p}</li>`).join('')}</ul>
      </div>
    </div>
    <div class="brief-section">
      <div class="brief-section-header">
        <div class="brief-section-num" style="background:${C[1]}">2</div>
        <div class="brief-section-title">Conversation Priorities &amp; Prompts</div>
      </div>
      <div class="brief-section-body">
        ${b.s2.map(p=>`<div style="margin-bottom:10px">
          <div style="font-size:11px;font-weight:700;color:var(--text);margin-bottom:3px">${p.n}. ${p.topic}</div>
          <div style="font-size:11px;color:var(--text-mid);font-style:italic;padding:6px 10px;background:var(--bg-soft);border-radius:6px;border-left:3px solid ${C[1]}">"${p.prompt}"</div>
        </div>`).join('')}
      </div>
    </div>
    <div class="brief-section">
      <div class="brief-section-header">
        <div class="brief-section-num" style="background:${C[2]}">3</div>
        <div class="brief-section-title">Interventions &amp; Do-Not-Do Guidance</div>
      </div>
      <div class="brief-section-body">
        <p><strong>Do:</strong></p>
        <ul>${b.s3.do.map(a=>`<li>${a}</li>`).join('')}</ul>
        <p style="margin-top:8px"><strong>Do NOT:</strong></p>
        <ul style="color:#c53030">${b.s3.donot.map(a=>`<li>${a}</li>`).join('')}</ul>
      </div>
    </div>
    <div class="brief-disclaimer">AI-generated brief based on risk model signals. Review with HR before acting. Individual responses are anonymised — inferences are probabilistic, not diagnostic.</div>`;
}

