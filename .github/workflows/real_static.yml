      { n:1, topic:"Partner aspiration", prompt:"You've been with Nexia longer than almost anyone in your team — I want to make sure we're thinking about your future as actively as you are. Where do you see yourself in three to five years?" },
      { n:2, topic:"Culture and influence", prompt:"You have more context than almost anyone about how this team works — what's the one thing you think we could do differently to make it stronger?" },
      { n:3, topic:"Personal energy", prompt:"Six and a half years is a significant investment — what keeps the work interesting for you, and is there anything you'd like to explore that you haven't had the chance to yet?" }
    ],
    s3: {
      do: ["Actively sponsor Connor for the partner track — his retention profile makes him a firm asset worth visible investment", "Leverage his tenure in mentoring programs for high-risk junior staff", "Ensure he has executive visibility and is recognised at the partner level"],
      donot: ["Do NOT take his stability for granted — senior performers who feel overlooked despite long tenure are the firm's most damaging exits", "Do NOT let the career ceiling conversation go unaddressed — ambiguity at this level can reverse even a strong retention profile"]
    }
  }
};

/* ── BRIEF DISPLAY ── */
function generateBrief(empId) {
  const briefDiv = document.getElementById('brief-output-'+empId);
  const btn = document.getElementById('brief-btn-'+empId);
  if (!briefDiv || !btn) return;
  const brief = MOCK_BRIEFS[empId];
  if (!brief) { briefDiv.innerHTML = '<div class="brief-error">No brief available for this employee.</div>'; return; }
  briefDiv.innerHTML = renderBriefHTML(brief);
  btn.style.display = 'none';
}

const AVATAR_COLORS = [
  {bg:'#e6f9f7',fg:'#0F6E56'},{bg:'#e6f1fb',fg:'#185FA5'},{bg:'#faeeda',fg:'#854F0B'},
  {bg:'#fcebeb',fg:'#A32D2D'},{bg:'#eeedfe',fg:'#534AB7'},{bg:'#fbeaf0',fg:'#993556'},
];

function riskColor(r){ return r>=60?'#e53e3e':r>=40?'#dd6b20':'#0F6E56'; }
function riskBadge(r){ return r>=60?'chip-high':r>=40?'chip-med':'chip-low'; }
function riskLabel(r){ return r>=60?'High':r>=40?'Medium':'Low'; }
function prioBadge(r,iv){ return (iv>0||r>=60)?['FLAG','chip-flag']:r>=40?['WATCH','chip-watch']:['OK','chip-ok']; }
function initials(n){ return n.split(' ').map(x=>x[0]).join(''); }

function deptAvg(unit){
  const arr = unit ? employees.filter(e=>e.unit===unit) : employees;
  return Math.round(arr.reduce((s,e)=>s+e.risk,0)/arr.length);
}
function deptTrend(unit){
  const arr = unit ? employees.filter(e=>e.unit===unit) : employees;
  return MONTHS.map((_,i)=>Math.round(arr.reduce((s,e)=>s+e.trend[i],0)/arr.length));
}

let selectedDept = null;
let selectedId = null;
let currentFilter = 'all';
let empChart = null;
let deptChart = null;
let overallChart = null;

/* ── OVERALL KPIs ── */
function renderKPIs(){
  const avg = deptAvg(null);
  const flagged = employees.filter(e=>e.iv>0||e.risk>=60).length;
  const watch = employees.filter(e=>e.risk>=40&&e.risk<60&&e.iv===0).length;
  const ok = employees.length - flagged - watch;
  document.getElementById('kpi-overall').textContent = avg+'%';
  document.getElementById('ob-num').textContent = avg+'%';
  document.getElementById('ob-flagged').textContent = flagged;
  document.getElementById('ob-watch').textContent = watch;
  document.getElementById('ob-ok').textContent = ok;
}

/* ── OVERALL TREND CHART ── */
function renderOverallTrend(){
  const trend = deptTrend(null);
  const ctx = document.getElementById('overallTrendChart').getContext('2d');
  if(overallChart) overallChart.destroy();
  overallChart = new Chart(ctx, {
    type:'line',
    data:{
      labels: MONTHS,
      datasets:[{
        label:'Firm average',
        data: trend,
        borderColor:'#0D3349',
        backgroundColor:'rgba(13,51,73,0.07)',
        borderWidth:2.5,
        pointRadius:4,
        pointBackgroundColor:'#0D3349',
        fill:true,
        tension:0.35,
      }]
    },
    options:{
      responsive:true, maintainAspectRatio:false,
      plugins:{ legend:{display:false}, tooltip:{ callbacks:{ label: ctx => ctx.parsed.y+'% avg risk' } } },
      scales:{
        y:{ min:0, max:80, ticks:{callback:v=>v+'%', font:{size:10}, color:'#718096'}, grid:{color:'#f0f4f8'}, border:{display:false} },
        x:{ ticks:{font:{size:10}, color:'#718096'}, grid:{display:false}, border:{display:false} }
      }
    }
  });
}

/* ── DEPT TREND CHART ── */
function renderDeptTrend(){
  const units = ['Assurance','Tax','Advisory'];
  const colors = ['#e53e3e','#dd6b20','#0ABEA8'];
  const ctx = document.getElementById('deptTrendChart').getContext('2d');
  if(deptChart) deptChart.destroy();
  deptChart = new Chart(ctx, {
    type:'line',
    data:{
      labels: MONTHS,
      datasets: units.map((u,i)=>{
        const active = !selectedDept || selectedDept===u;
        return {
          label: u,
          data: deptTrend(u),
          borderColor: colors[i],
          backgroundColor: 'transparent',
          borderWidth: selectedDept===u ? 3 : (selectedDept ? 1 : 2),
          borderDash: (!selectedDept||selectedDept===u) ? [] : [4,3],
          pointRadius: selectedDept===u ? 5 : 3,
          pointBackgroundColor: colors[i],
          tension:0.35,
          opacity: active ? 1 : 0.3,
        };
      })
    },
    options:{
      responsive:true, maintainAspectRatio:false,
      plugins:{
        legend:{display:false},
        tooltip:{ callbacks:{ label: ctx => ctx.dataset.label+': '+ctx.parsed.y+'%' } }
      },
      scales:{
        y:{ min:0, max:80, ticks:{callback:v=>v+'%', font:{size:10}, color:'#718096'}, grid:{color:'#f0f4f8'}, border:{display:false} },
        x:{ ticks:{font:{size:10}, color:'#718096'}, grid:{display:false}, border:{display:false} }
      }
    }
  });
  // custom legend
  const legendHtml = units.map((u,i)=>`<span style="display:inline-flex;align-items:center;gap:5px;font-size:11px;color:var(--text-mid);opacity:${!selectedDept||selectedDept===u?1:0.4}">
    <span style="width:14px;height:3px;background:${colors[i]};border-radius:2px;display:inline-block;"></span>${u}
  </span>`).join('');
  let leg = document.getElementById('dept-legend');
  if(!leg){ leg=document.createElement('div'); leg.id='dept-legend'; leg.style.cssText='display:flex;gap:16px;margin-bottom:8px;'; document.getElementById('deptTrendChart').parentElement.before(leg); }
  leg.innerHTML = legendHtml;
}

/* ── DEPT CARDS ── */
function renderDepts(){
  const units = ['Assurance','Tax','Advisory'];
  const colors = { Assurance:'#e53e3e', Tax:'#dd6b20', Advisory:'#0ABEA8' };
  document.getElementById('dept-grid').innerHTML = units.map(u=>{
    const avg = deptAvg(u);
    const count = employees.filter(e=>e.unit===u).length;
    const flagged = employees.filter(e=>e.unit===u&&(e.iv>0||e.risk>=60)).length;
    return `<div class="dept-card ${selectedDept===u?'active':''}" onclick="selectDept('${u}')">
      <div class="dept-name">${u}</div>
      <div class="dept-risk" style="color:${riskColor(avg)}">${avg}%</div>
      <div class="dept-bar-track"><div class="dept-bar-fill" style="width:${avg}%;background:${riskColor(avg)};"></div></div>
      <div class="dept-meta">${count} staff · ${flagged} flagged</div>
    </div>`;
  }).join('');
}

function selectDept(unit){
  selectedDept = selectedDept===unit ? null : unit;
  selectedId = null;
  renderDepts();
  renderDeptTrend();
  renderEmployees();
  renderPanel();
  document.getElementById('emp-table-title').textContent = selectedDept ? selectedDept+' team' : 'All employees';
}

/* ── EMPLOYEE TABLE ── */
function filterRisk(f, btn){
  currentFilter = f;
  document.querySelectorAll('.filter-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  renderEmployees();
}

function renderEmployees(){
  let data = [...employees].sort((a,b)=>b.risk-a.risk);
  if(selectedDept) data = data.filter(e=>e.unit===selectedDept);
  if(currentFilter==='high') data = data.filter(e=>e.risk>=60);
  if(currentFilter==='flagged') data = data.filter(e=>e.iv>0||e.risk>=60);
  const list = document.getElementById('emp-list');
  list.innerHTML = '';
  data.forEach((e,i)=>{
    const ac = AVATAR_COLORS[i%AVATAR_COLORS.length];
    const [prioLabel,prioCls] = prioBadge(e.risk,e.iv);
    const row = document.createElement('div');
    row.className='emp-row'+(selectedId===e.id?' selected':'');
    row.innerHTML=`
      <div class="avatar" style="background:${ac.bg};color:${ac.fg}">${initials(e.name)}</div>
      <div><div class="emp-name-text">${e.name}</div><div class="emp-sub">${e.role} · ${e.unit}</div></div>
      <div class="risk-cell">
        <span class="risk-val" style="color:${riskColor(e.risk)}">${e.risk}%</span>
        <div class="risk-track"><div class="risk-track-fill" style="width:${e.risk}%;background:${riskColor(e.risk)};"></div></div>
      </div>
      <div><span class="cohort-chip">${e.cohort}</span><div class="emp-sub" style="margin-top:3px">${e.los}yr LOS</div></div>
      <div><span class="chip ${prioCls}">${prioLabel}</span></div>
      <div><span class="chip ${riskBadge(e.risk)}">${riskLabel(e.risk)}</span></div>`;
    row.onclick=()=>selectEmployee(e.id);
    list.appendChild(row);
  });
}

/* ── EMPLOYEE PANEL ── */
function selectEmployee(id){
  selectedId = selectedId===id ? null : id;
  renderEmployees();
  renderPanel();
}

function renderPanel(){
  const panel = document.getElementById('panel-content');
  document.getElementById('panel-title').textContent = 'Employee detail';
  if(!selectedId){
    panel.innerHTML=`<div class="panel-empty"><div class="panel-empty-icon">↖</div><div class="panel-empty-text">Select an employee from the table to view their risk profile, trend, and intervention plan.</div></div>`;
    return;
  }
  const e = employees.find(x=>x.id===selectedId);
  document.getElementById('panel-title').textContent = e.name;
  const pattern = detectPattern(e);

  const stepDefs=[
    {n:'1',label:'Career dialogue',sub:'5-point session within 2 weeks',c:'#0F6E56'},
    {n:'2',label:'Monthly reviews',sub:'15-min accountability × 3 months',c:'#185FA5'},
    {n:'3',label:'Reassessment',sub:'Re-run risk score & reclassify',c:'#854F0B'},
  ];

  const fmap=[
    {name:'Tenure',val:e.factors.tenure,neg:e.factors.tenure.includes('high')||e.factors.tenure.includes('elev'),pos:e.factors.tenure==='stable'},
    {name:'Cohort',val:e.factors.cohort,neg:e.factors.cohort.includes('2022'),pos:!e.factors.cohort.includes('2022')},
    {name:'Role type',val:e.factors.role,neg:false,pos:e.factors.role==='management'},
    {name:'Engagement',val:e.factors.engagement,neg:e.factors.engagement==='low'||e.factors.engagement==='unknown',pos:e.factors.engagement==='high'},
  ];

  const [prioLabel,prioCls]=prioBadge(e.risk,e.iv);

  panel.innerHTML=`
    <div class="panel-employee">
      <div class="panel-emp-header">
        <div class="panel-avatar" style="background:#e6f9f7;color:#0F6E56">${initials(e.name)}</div>
        <div><div class="panel-name">${e.name}</div><div class="panel-role">${e.role} · ${e.unit}</div></div>
      </div>

      <div class="panel-risk-big">
        <div class="panel-risk-num" style="color:${riskColor(e.risk)}">${e.risk}%</div>
        <div>
          <div style="font-size:12px;font-weight:600;color:${riskColor(e.risk)}">${riskLabel(e.risk)} risk</div>
          <div class="panel-risk-label">churn probability score</div>
          <div style="margin-top:6px"><span class="chip ${prioCls}">${prioLabel}</span></div>
        </div>
      </div>

      <div class="chart-section">
        <div class="chart-title">Individual risk trend — 6 months</div>
        <div class="chart-wrap"><canvas id="empTrendChart" role="img" aria-label="Line chart of ${e.name} churn risk">${e.name} risk trend.</canvas></div>
      </div>

      <div class="factors-grid">
        ${fmap.map(f=>`<div class="factor-item">
          <div class="factor-name">${f.name}</div>
          <div class="factor-val ${f.neg?'neg':f.pos?'pos':'neu'}">${f.val}</div>
        </div>`).join('')}
      </div>

      <div class="intervention-section">
        <div class="int-title">Intervention cycle</div>
        <div class="int-steps">
          ${stepDefs.map((s,i)=>{
            const done=e.iv>i+1, active=e.iv===i+1;
            const stText=done?'Done':active?'Active':'Pending';
            const stStyle=done?'background:#f0fff4;color:#276749':active?'background:#fffaf0;color:#c05621':'background:#f8fafc;color:#718096';
            return `<div class="int-step ${done?'done':active?'active':''}">
              <div class="int-step-num" style="background:${s.c}20;color:${s.c}">${s.n}</div>
              <div><div class="int-step-label">${s.label}</div><div class="int-step-sub">${s.sub}</div></div>
              <span class="int-step-status" style="${stStyle}">${stText}</span>
            </div>`;
          }).join('')}
        </div>
      </div>

      <div style="border-top:1px solid var(--border-light);padding-top:16px;margin-bottom:2px">
        <div class="int-title" style="margin-bottom:10px">AI-detected risk pattern</div>
        <div class="pattern-card ${pattern.cls}">
          <div class="pattern-name" style="color:${pattern.color}">${pattern.label}</div>
          <div class="pattern-issue">${pattern.issue}</div>
          <div class="pattern-signals">Input signals: ${e.signals}</div>
        </div>
      </div>

      <div class="brief-wrap">
        <div class="int-title" style="margin-bottom:10px">AI manager brief</div>
        <button class="brief-gen-btn" id="brief-btn-${e.id}" onclick="generateBrief(${e.id})" style="display:none">
          <span class="btn-icon">✦</span> Generate AI manager brief
        </button>
        <div id="brief-output-${e.id}" style="margin-top:4px"></div>
      </div>
    </div>`;

  // auto-display brief immediately
  requestAnimationFrame(()=>{
    generateBrief(e.id);
  });

  requestAnimationFrame(()=>{
    const ctx2 = document.getElementById('empTrendChart');
    if(!ctx2) return;
    if(empChart) empChart.destroy();
    const color = riskColor(e.risk);
    empChart = new Chart(ctx2.getContext('2d'),{
      type:'line',
      data:{
        labels: MONTHS,
        datasets:[{
          label:'Risk score',
          data: e.trend,
          borderColor: color,
          backgroundColor: color+'18',
          borderWidth:2.5,
          pointRadius:4,
          pointBackgroundColor: color,
          fill:true,
          tension:0.35,
        }]
      },
      options:{
        responsive:true, maintainAspectRatio:false,
        plugins:{ legend:{display:false}, tooltip:{ callbacks:{ label: ctx=>ctx.parsed.y+'% churn risk' } } },
        scales:{
          y:{ min:0, max:80, ticks:{callback:v=>v+'%',font:{size:10},color:'#718096'}, grid:{color:'#f0f4f8'}, border:{display:false} },
          x:{ ticks:{font:{size:10},color:'#718096'}, grid:{display:false}, border:{display:false} }
        }
      }
    });
  });
}

renderKPIs();
renderOverallTrend();
renderDepts();
renderDeptTrend();
renderEmployees();
</script>
</body>
</html>
